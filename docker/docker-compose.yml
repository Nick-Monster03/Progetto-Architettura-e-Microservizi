version: '3.8'

services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: camunda
      POSTGRES_USER: camunda
      POSTGRES_PASSWORD: camunda
    ports:
      - "5433:5432"
    networks:
      - acme-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camunda"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Servizi Jolie ──────────────────────────────────────────────────────────

  user-service:
    build:
      context: ../src/user-management
    container_name: acme-user-service
    ports:
      - "8005:8005"
    networks:
      - acme-net

  bank-service:
    build:
      context: ../src/bank-jolie
    container_name: bank-service
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - acme-net

  station-service:
    build:
      context: ../src/stations
    container_name: station-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - acme-net

  # ── Fleet Management cluster ───────────────────────────────────────────────

  tracking-service:
    build:
      context: ../src/fleet-management/tracking
    container_name: tracking-service
    expose:
      - "8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - acme-net

  battery-service:
    build:
      context: ../src/fleet-management/battery
    container_name: battery-service
    expose:
      - "8085"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - acme-net

  calculator-service:
    build:
      context: ../src/service-utils
    container_name: calculator-service
    ports:
      - "8089:8089"
    networks:
      - acme-net

  simulator-service:
    build:
      context: ../src
      dockerfile: simulation/Dockerfile
    container_name: simulator-service
    ports:
      - "8086:8086"
    depends_on:
      - tracking-service
      - battery-service
    networks:
      - acme-net

  fleet-gateway:
    build:
      context: ../src
      dockerfile: fleet-management/gateway/Dockerfile
    container_name: fleet-gateway
    ports:
      - "8082:8082"
    environment:
      - TRACKING_HOST=tracking-service
      - BATTERY_HOST=battery-service
      - CALCULATOR_HOST=calculator-service
    depends_on:
      - tracking-service
      - battery-service
      - calculator-service
      - simulator-service
    networks:
      - acme-net

  # ── Orchestratore BPMN (Camunda + Spring Boot) ─────────────────────────────
  camunda-acme:
    build:
      context: ../camunda-acme
      dockerfile: Dockerfile
    container_name: camunda-acme
    ports:
      - "8080:8080"
    environment:
      # Attiva il profilo Spring "docker" che usa application-docker.yml
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      postgres:
        condition: service_healthy
      bank-service:
        condition: service_started
      station-service:
        condition: service_started
      fleet-gateway:
        condition: service_started
      calculator-service:
        condition: service_started
    networks:
      - acme-net
    # Camunda impiega ~30s ad avviarsi: healthcheck generoso
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Client Web ─────────────────────────────────────────────────────────────
  client-app:
    build:
      context: ../src/client-app
    container_name: client-app
    ports:
      - "3000:3000"
    depends_on:
      - fleet-gateway
      - camunda-acme
    networks:
      - acme-net

networks:
  acme-net:
    driver: bridge

volumes:
  postgres-data: