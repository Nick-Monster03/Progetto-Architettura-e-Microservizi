<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACMEMobility</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-success shadow fixed-top" style="opacity: 0.95;">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1 fw-bold">
                <i class="bi bi-lightning-charge-fill text-warning"></i> ACMEMobility
            </span>
        </div>
    </nav>

    <div id="map"></div>

    <div class="fixed-bottom p-3 d-flex justify-content-center floating-panel-container">
        <div class="card shadow-lg border-0 rounded-4 floating-panel">
            <div class="card-body text-center p-4">
                
                <div id="guest-section">
                    <h5 class="card-title fw-bold mb-3">Pronto a partire?</h5>
                    <button class="btn btn-success w-100 mb-2 rounded-pill fw-bold" data-bs-toggle="modal" data-bs-target="#loginModal">
                        Accedi
                    </button>
                    <button class="btn btn-outline-secondary w-100 rounded-pill" data-bs-toggle="modal" data-bs-target="#registerModal">
                        Crea un Account
                    </button>
                </div>

                <div id="logged-section" class="d-none">
                    <p class="mb-3 text-muted">Bentornato, <strong id="user-display" class="text-dark"></strong></p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-warning rounded-pill fw-bold shadow-sm" onclick="app.scanQR()">
                            <i class="bi bi-qr-code-scan"></i> Scansiona QR Veicolo
                        </button>
                        <button class="btn btn-light border rounded-pill text-secondary" onclick="app.refreshMap()">
                            <i class="bi bi-arrow-clockwise"></i> Aggiorna Mappa
                        </button>
                        <button class="btn btn-link text-danger text-decoration-none btn-sm mt-2" onclick="app.logout()">
                            Esci dall'account
                        </button>
                    </div>
                </div>

                <div id="renting-section" class="d-none">
                    <div class="alert alert-danger fw-bold rounded-4 mb-3" role="alert">
                        <i class="bi bi-scooter"></i> In Viaggio con <span id="current-vehicle-id"></span>
                        <div class="spinner-grow spinner-grow-sm text-danger ms-2" role="status"></div>
                    </div>
                    <button class="btn btn-danger w-100 rounded-pill fw-bold shadow" onclick="app.stopRental()">
                        <i class="bi bi-stop-circle-fill"></i> Termina Noleggio
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Accedi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pb-4">
                    <input type="text" id="username" class="form-control form-control-lg rounded-3 mb-3" placeholder="Nome Utente" value="MarioRossi">
                    <input type="password" id="password" class="form-control form-control-lg rounded-3 mb-3" placeholder="Password" value="password123">
                    <button class="btn btn-success w-100 btn-lg rounded-3 fw-bold" onclick="app.login()">Entra</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Nuovo Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pb-4">
                    <input type="text" id="reg-username" class="form-control form-control-lg rounded-3 mb-3" placeholder="Scegli Nome Utente">
                    <input type="password" id="reg-password" class="form-control form-control-lg rounded-3 mb-3" placeholder="Scegli Password">
                    <button class="btn btn-primary w-100 btn-lg rounded-3 fw-bold" onclick="app.register()">Registrati</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
