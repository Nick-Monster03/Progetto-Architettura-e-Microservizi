spring:
  application:
    name: acme-camunda-orchestrator

  datasource:
    # Dentro Docker: il container postgres è raggiungibile per nome, porta interna 5432
    url: jdbc:postgresql://postgres:5432/camunda
    username: camunda
    password: camunda
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      firstName: Admin
      lastName: User
    auto-deployment-enabled: true
    client:
      base-url: http://localhost:8080/engine-rest
    database:
      schema-update: true
      type: postgres
    history-level: full
    job-execution:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 30m

logging:
  level:
    root: INFO
    com.acme: DEBUG
    org.camunda: INFO
    org.springframework: INFO

# URL dei servizi con nomi Docker (non localhost)
services:
  bank:
    url: http://bank-service:8008
    wsdl: http://bank-service:8008?wsdl

  station:
    url: http://station-service:8083
    wsdl: http://station-service:8083?wsdl

  fleet:
    url: http://fleet-gateway:8082

  calculator:
    url: http://calculator-service:8089
    wsdl: http://calculator-service:8089?wsdl