spring:
  application:
    name: acme-camunda-orchestrator
  
  datasource:
    # CORRETTO: Porta 5433 (quella mappata sul PC)
    url: jdbc:postgresql://localhost:5433/camunda
    username: camunda
    password: camunda
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      firstName: Admin
      lastName: User
    auto-deployment-enabled: true
    client:
      base-url: http://localhost:8080/engine-rest
    database:
      schema-update: true
      type: postgres
    history-level: full
    job-execution:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 30m

logging:
  level:
    root: INFO
    com.acme: DEBUG
    org.camunda: INFO
    org.springframework: INFO

# CORRETTO: Sostituiti tutti i nomi dei container con 'localhost'
services:
  bank:
    url: http://localhost:8008
    wsdl: http://localhost:8008?wsdl
  
  station:
    url: http://localhost:8083
    wsdl: http://localhost:8083?wsdl
  
  fleet:
    url: http://localhost:8082
  
  calculator:
    url: http://localhost:8089
    wsdl: http://localhost:8089?wsdl